name: "My Media for Alexa"
description: "Stream your personal music library to Amazon Alexa devices using My Media for Alexa."
version: "1.3.156"
slug: "mymediaforalexa"
init: false
homeassistant_api: false
hassio_api: false
auth_api: false
ingress: false

url: "https://www.mymediaforalexa.com"

# Multi-architecture Docker Hub image (manifest created by 21-publish-docker-latest.sh)
image: "bizmodeller/mymediaforalexa"

# Supported architectures
arch:
  - amd64
  - aarch64
  - armhf
  - i386

# Use host networking so the service is directly reachable on the host IP
# without Docker NAT. This also ensures mDNS/UPnP/Bonjour discovery works
# correctly for Alexa device communication.
host_network: true

# Ports are informational only when host_network is true
ports_description:
  52050/tcp: "My Media for Alexa HTTP port"
  52051/tcp: "My Media for Alexa HTTPS port"

# Persistent storage
map:
  - type: bind
    source: /share/mymedia/medialibrary
    target: /medialibrary
    read_only: false

# Environment variables
options:
  log_to_console: true
  ffmpeg_tmp_dir: /tmp

schema:
  log_to_console: bool
  ffmpeg_tmp_dir: str

# Devices / capabilities
privileged: []
full_access: false
apparmor: true

# Add-on panel (no built-in web UI ingress, user accesses directly via port)
panel_icon: "mdi:music-box-multiple"
panel_title: "My Media for Alexa"
